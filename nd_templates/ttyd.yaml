---
name: ttyd
url: https://github.com/tsl0922/ttyd
binaries:
  urls:
    1.7.7: https://github.com/tsl0922/ttyd/releases/download/1.7.7/ttyd
  arguments:
    required:
      - version
    optional:
      arch: "x86_64"
      addpath: ""
  dependencies:
    apt:
      - tmux
  instructions: |
    export DEBIAN_FRONTEND=noninteractive TZ={{ self.env.TZ }}
    {{ self.install_dependencies() }}
    curl -L --output /usr/bin/ttyd "{{ self.urls[self.version] }}.{{ self.arch }}"
    chmod +x /usr/bin/ttyd
    {% if self.addpath %}
    echo "#!/usr/bin/env bash" > /etc/profile.d/tmux.sh 
    echo "export PATH=\$PATH:{{ self.path }}" >> /etc/profile.d/tmux.sh
    chmod +x /etc/profile.d/tmux.sh
    {% endif %}
  env:
    TZ: "America/New_York"